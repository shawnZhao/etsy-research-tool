services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: etsy
      POSTGRES_PASSWORD: etsy_dev
      POSTGRES_DB: etsy_research
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etsy -d etsy_research"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://etsy:etsy_dev@postgres:5432/etsy_research
      DATABASE_URL_SYNC: postgresql://etsy:etsy_dev@postgres:5432/etsy_research
      REDIS_URL: redis://redis:6379/0
      ETSY_API_KEY: ${ETSY_API_KEY}
      ETSY_API_SECRET: ${ETSY_API_SECRET}
      ETSY_ACCESS_TOKEN: ${ETSY_ACCESS_TOKEN}
      ETSY_REFRESH_TOKEN: ${ETSY_REFRESH_TOKEN}
      ETSY_PROXY_URL: ${ETSY_PROXY_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://etsy:etsy_dev@postgres:5432/etsy_research
      DATABASE_URL_SYNC: postgresql://etsy:etsy_dev@postgres:5432/etsy_research
      REDIS_URL: redis://redis:6379/0
      ETSY_API_KEY: ${ETSY_API_KEY}
      ETSY_API_SECRET: ${ETSY_API_SECRET}
      ETSY_ACCESS_TOKEN: ${ETSY_ACCESS_TOKEN}
      ETSY_REFRESH_TOKEN: ${ETSY_REFRESH_TOKEN}
      ETSY_PROXY_URL: ${ETSY_PROXY_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    depends_on:
      - backend

volumes:
  pgdata:
